<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amonelu Stickers</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1 class="logo">♡ Amonelu Stickers ♡</h1>

<div class="menu">
<button>🏠 Início</button>
<button>🛍️ Catálogo</button>
<button>❤️ Favoritos</button>
<button>🛒 Carrinho <span id="carrinho">0</span></button>
</div>

</header>

<img class="banner" src="file_00000000b29c720eb9ee8120087b1887.png" alt="Banner">

<div class="pesquisa">
<input type="text" placeholder="🔎 Procurar stickers...">
</div>

<div class="categorias">
<button>💜 BTS</button>
<button>😂 Engraçados</button>
<button>🐶 Cachorros</button>
<button>💕 Personalizados</button>
<button>🎵 Música</button>
</div>
<div class="produto">

<h2>📸 Stickers Personalizados com Sua Foto</h2>

<p>💖 Envie sua foto e escolha a quantidade.</p>

<label>Quantidade:</label><br><br>

<select id="quantidade">
<option value="3">3 stickers - R$10,00</option>
<option value="5">5 stickers - R$15,00</option>
<option value="10">10 stickers - R$25,00</option>
<option value="20">20 stickers - R$40,00</option>
<option value="30">30 stickers - R$55,00</option>
</select>

<br><br>

<label>Escolha sua foto:</label><br><br>

<input type="file" accept="image/*">

<br><br>

<a class="botao" href="https://wa.me/55SEUNUMERO">
✨ Enviar Foto e Comprar
</a>

</div>
<h2 class="titulo">✨ Escolha seus stickers ✨</h2>

<div class="loja">

<div class="produto">
<img src="stickers/acorda-preguica.png" width="100%">
<h3>😂 Acorda, Preguiça!</h3>
<p>R$ 2,00</p>
<button onclick="adicionarCarrinho()">🛒 Comprar</button>
</div>

<div class="produto">
<img src="stickers/bom-dia.png" width="100%">
<h3>🌸 Bom Dia!</h3>
<p>R$ 2,00</p>
<button onclick="adicionarCarrinho()">🛒 Comprar</button>
</div>

<div class="produto">
<img src="stickers/bts.png" width="100%">
<h3>💜 BTS</h3>
<p>R$ 5,00</p>
<button onclick="adicionarCarrinho()">🛒 Comprar</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>p
