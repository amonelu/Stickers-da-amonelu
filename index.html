<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amonelu Stickers</title>

<style>
body{
font-family:Arial,sans-serif;
background:#ffebf5;
text-align:center;
margin:0;
}

header{
background:#ff4da6;
color:white;
padding:25px;
}

.produto{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

button{
background:#25D366;
color:white;
padding:15px 25px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>💖 Amonelu Stickers 💖</h1>
<p>Stickers animados personalizados para WhatsApp e Instagram</p>
</header>

<div class="produto">
<h2>✨ Pacote Básico</h2>
<p>10 stickers animados</p>
<h3>R$ 10,00</h3>
<button>Comprar</button>
</div>

<div class="produto">
<h2>🔥 Pacote Premium</h2>
<p>30 stickers animados</p>
<h3>R$ 25,00</h3>
<button>Comprar</button>
</div>

</body>
</html>
