<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Cantinho Fofo ♡</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background-color:#ffeef6;

background-image:
radial-gradient(#ff9ecf 2px, transparent 2px),
radial-gradient(#ffffff 2px, transparent 2px);

background-size:45px 45px;
background-position:0 0,22px 22px;
}

/* Corações */
body::before{
content:"♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡";
position:fixed;
top:0;
left:0;
width:100%;
font-size:28px;
color:#ffc7df55;
letter-spacing:20px;
pointer-events:none;
}

/* Cabeçalho */

header{
background:#ffb6d8;
padding:25px;
text-align:center;
font-size:35px;
font-weight:bold;
color:white;
border-bottom:6px solid white;
box-shadow:0 5px 15px #ff8dc3;
}

/* Vitrines */

.vitrine{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
padding:40px;
}

.card{

background:white;

border:5px solid #ffd6ea;

border-radius:30px;

padding:15px;

text-align:center;

box-shadow:0 8px 20px rgba(255,170,210,.5);

transition:.3s;
}

.card:hover{
transform:translateY(-8px) scale(1.04);
}

.card img{
width:100%;
border-radius:20px;
}

.card h2{
margin:15px 0;
color:#ff69a6;
}

.card button{

background:#ff8fbe;

color:white;

border:none;

padding:12px 28px;

border-radius:40px;

cursor:pointer;

font-size:17px;

transition:.3s;
}

.card button:hover{
background:#ff69a6;
}

/* Rodapé */

footer{
background:#ffb6d8;
padding:18px;
text-align:center;
color:white;
margin-top:40px;
font-size:18px;
}
</style>

</head>

<body>

<header>
♡
