<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Site Fofo</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background-color:#ffeef6;

    /* Papel de parede de corações */
    background-image:
    radial-gradient(#ff9ecb 2px, transparent 2px),
    radial-gradient(#ffffff 2px, transparent 2px);

    background-size:40px 40px;
    background-position:0 0,20px 20px;
}

/* Cabeçalho */
header{
    background:linear-gradient(90deg,#ffb6d9,#ffd6ea);
    color:#fff;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

/* Vitrine */
.vitrine{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:25px;
}

.card{
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(255,105,180,.25);
    transition:.3s;
    border:3px solid #ffd6ea;
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    color:#ff5fa2;
    text-align:center;
}

.card p{
    text-align:center;
    color:#666;
}

.botao{
    display:block;
    width:80%;
    margin:15px auto;
    padding:12px;
    background:#ff8fc1;
    color:white;
    text-align:center;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}

.botao:hover{
    background:#ff5fa2;
}
</style>
</head>

<body>

<header>
♡ Meu Cantinho Fofo ♡
</header>

<div class="vitrine">

<div class="card">
<img src="https://via.placeholder.com/300x300" alt="">
<h3>Sticker 1</h3>
<p>Bem fofinho ♡</p>
<a href="#" class="botao">Ver</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x300" alt="">
<h3>Sticker 2</h3>
<p>Super meigo ♡</p>
<a href="#" class="botao">Ver</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x300" alt="">
<h3>Sticker 3</h3>
<p>Novidade ♡</p>
<a href="#" class="botao">Ver</a>
</div>

</div>

</body>
</html>
